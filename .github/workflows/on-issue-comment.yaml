name: "On Issue Comment"
on:
  issue_comment:
    types: [created]

permissions:
  actions: write # Required to dispatch workflows
  contents: read # Default required for checkout
    
jobs:
  check-pr-comment:
    if: ${{ github.event.issue.pull_request && github.event.issue.state == 'open' }}
    runs-on: ubuntu-latest
    outputs:
      comment: ${{ steps.set-output.outputs.comment }}
      issue: ${{ steps.set-output.outputs.issue }}
      repository: ${{ steps.set-output.outputs.repository }}
      sender: ${{ steps.set-output.outputs.sender }}
    steps:
      - name: Trigger workflow
        id: set-output
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const prRef = `refs/pull/${prNumber}/merge`;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const prHeadRef = pr.data.head.ref;
            const prHeadRepo = pr.data.head.repo.full_name;
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;

            if (prHeadRepo !== baseRepo) {
              core.setFailed(
                `Cannot dispatch on PR head branch for forked PR (${prHeadRepo}). ref must exist in ${baseRepo}.`
              );
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              workflow_id: 'on-pr-comment.yaml',
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: prHeadRef,
              inputs: {
                'pr-number': `${prNumber}`,
                'pr-ref': prRef,
                'pr-head-ref': prHeadRef,
                'comment-id': `${context.payload.comment.id}`,
                'comment-body': context.payload.comment.body || '',
                'comment-url': context.payload.comment.html_url || '',
                'sender-login': context.payload.sender.login,
                'issue-author-login': context.payload.issue.user.login,
              },
            })
  

