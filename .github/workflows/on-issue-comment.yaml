name: "On Issue Comment"
on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read

jobs:
  check-pr-comment:
    if: ${{ github.event.issue.pull_request && github.event.issue.state == 'open' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const prRef = `refs/pull/${prNumber}/merge`;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const prHeadRef = pr.data.head.ref;

            await github.rest.actions.createWorkflowDispatch({
              workflow_id: 'on-pr-comment.yaml',
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: prHeadRef,
              inputs: {
                comment: JSON.stringify(context.payload.comment),
                issue: JSON.stringify(context.payload.issue),
              },
            })
