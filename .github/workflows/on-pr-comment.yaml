name: "On PR Comment"

on: 
  workflow_dispatch:
    inputs:
      comment:
        description: 'JSON string of the comment payload from the issue_comment event'
        required: true
        type: string
      issue:
        description: 'JSON string of the issue payload from the issue_comment event'
        required: true
        type: string

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    steps:
      # This should be dispatched on the actual PR branch
      - uses: actions/checkout@v3

      - if: ${{ JSON.parse(inputs.comment).body.includes('!test') }}
        name: Run tests
        run: |
          echo "Running tests for PR #${{ JSON.parse(inputs.issue).number }}"

